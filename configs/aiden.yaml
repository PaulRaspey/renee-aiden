    loves: [Tom Waits, Leonard Cohen, Bill Callahan, The Walkmen, Nick Cave]
    likes: [old jazz, Springsteen, Drive-By Truckers]
    dislikes: [most contemporary pop, anything Auto-Tuned to oblivion]
