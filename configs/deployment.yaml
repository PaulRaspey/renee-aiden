# Deployment configuration

# Active deployment mode: "cloud" or "local"
mode: cloud

# Cloud configuration (RunPod)
cloud:
  provider: runpod
  pod_id: uopulnt3lmphso
  pod_template: renee-prod
  gpu_type: A100_SXM
  volume_name: renee-persistent
  volume_size_gb: 150
  region: US-TX  # closest to Dallas
  
  # Ports exposed on pod
  audio_bridge_port: 8765                # internal (container) port
  audio_bridge_port_external: 10287      # public TCP port mapped by RunPod; what the OptiPlex connects to
  eval_dashboard_port: 7860

  # OptiPlex-side mobile proxy (PWA over Tailscale). Phone browser hits
  # this port on the OptiPlex's Tailscale IP; the proxy relays audio and
  # transcripts to/from audio_bridge_port_external above.
  proxy_port: 8766
  
  # Auto-shutdown after N minutes of silence (no audio input)
  idle_shutdown_minutes: 60
  
  # Billing alerts
  daily_spend_alert_usd: 15
  monthly_budget_usd: 500

  # Model artifacts fetched by scripts/volume_setup.py onto
  # /workspace/models/<local_name>/ at provision time.
  # Swap quant variants by editing repo_id (e.g., -AWQ, -GPTQ-Int4, -GGUF).
  model_repos:
    - repo_id: Qwen/Qwen3-32B-Instruct-AWQ
      local_name: qwen3-32b-instruct-awq
    - repo_id: openai/whisper-large-v3-turbo
      local_name: whisper-large-v3-turbo
    - repo_id: coqui/XTTS-v2
      local_name: xtts-v2
    - repo_id: sentence-transformers/all-MiniLM-L6-v2
      local_name: all-MiniLM-L6-v2

# Local configuration (for when RTX Pro 6000 arrives)
local:
  workspace: "C:\\Users\\Epsar\\Desktop\\renee-workspace"
  gpu: rtx_pro_6000
  audio_bridge: local  # direct sounddevice, no network hop

# ASR pipeline (M1). Model is loaded lazily on first frame, so this block
# is safe to set even when faster-whisper isn't installed locally.
asr:
  model: small.en              # or a path like /workspace/models/whisper-large-v3-turbo
  device: cuda                 # "cuda" on pod, "cpu" on CPU boxes
  compute_type: float16        # "int8" on CPU, "float16" on GPU
  partial_interval_ms: 400
  silence_finalize_ms: 700
  silence_rms_threshold: 0.01
  min_speech_ms: 200
  beam_size: 1

# TTS pipeline (M5 send path).
# voice_id + api key come from .env (RENEE_VOICE_ID, ELEVENLABS_API_KEY);
# this block tunes synthesis only. TTS is skipped on startup when either
# env var is missing.
tts:
  model_id: eleven_multilingual_v2
  stability: 0.5
  similarity_boost: 0.85
  style: 0.2
  use_speaker_boost: true
  eleven_sample_rate: 22050    # ElevenLabs output_format=pcm_22050
  output_sample_rate: 48000    # wire/client playback rate — bridge resamples
  frame_size_ms: 20

# Audio bridge settings
audio:
  sample_rate: 48000
  channels: 1
  frame_size_ms: 20           # 960 samples at 48kHz
  codec: opus
  opus_bitrate: 48000         # 48kbps, high quality voice
  opus_application: voip
  
  # Local audio devices (auto-detect if null)
  input_device: null           # PJ's mic
  output_device: null          # PJ's speakers/headphones

# Model paths (relative to workspace root)
models:
  persona_primary: models/llama-3.3-70b-instruct-q8
  persona_fast: null           # use Groq for fast turns in cloud mode
  asr: models/whisper-large-v3-turbo
  tts: models/xtts-v2
  embeddings: models/all-MiniLM-L6-v2
  endpointer: models/endpointer
  backchannel: models/backchannel

# Cloud LLM routing (supplements local models).
# NOTE (drift watch): src/persona/llm_router.py currently reads GROQ_MODEL,
# OLLAMA_MODEL, and ANTHROPIC_MODEL from the environment, not this block.
# The values below are informational; set GROQ_MODEL/etc. in .env to
# override. When we wire yaml-driven routing, keep the defaults here in
# sync with the router's fallbacks (qwen/qwen3-32b, gemma4:e4b,
# claude-sonnet-4-5).
cloud_llm:
  groq:
    model: qwen/qwen3-32b
    key_env: GROQ_API_KEY
    use_for: fast_turns
    max_latency_ms: 300

  anthropic:
    model: claude-sonnet-4-5
    key_env: ANTHROPIC_API_KEY
    use_for: deep_reasoning
    max_latency_ms: 800

# State paths (relative to workspace root)
state:
  memory_db: state/renee_memory.db
  mood_db: state/renee_mood.db
  opinions_db: state/renee_opinions.db
  registry_db: state/uahp_registry.db
  eval_db: state/eval.db

# Backup
backup:
  enabled: true
  schedule: "0 4 * * *"       # 4am daily
  retention_days: 30
  encrypt: true
  offsite: false               # set true to sync to Backblaze B2
  offsite_bucket: null

# Startup
startup:
  self_test: true              # run quick inference+TTS on boot
  self_test_timeout_s: 30
  greeting: true               # Renée says hi when bridge connects
