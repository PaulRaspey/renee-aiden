<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d10" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Renée — Status</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d10;
      --card: #14181f;
      --fg: #eaeef3;
      --dim: #8b93a2;
      --ok: #4cd1a1;
      --warn: #f3c34c;
      --err: #ff6b6b;
      --accent: #c8a2ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg); color: var(--fg);
      font: 16px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    main { max-width: 480px; margin: 0 auto; padding: 22px 18px; }
    h1 { font-size: 22px; font-weight: 400; margin-bottom: 18px; letter-spacing: 0.02em; }
    .card {
      background: var(--card); border-radius: 12px; padding: 16px 18px;
      margin-bottom: 14px;
    }
    .row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 8px 0;
    }
    .row + .row { border-top: 1px solid rgba(255,255,255,0.06); }
    .key { color: var(--dim); font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; }
    .val { font-feature-settings: "tnum"; }
    .val.ok   { color: var(--ok); }
    .val.warn { color: var(--warn); }
    .val.err  { color: var(--err); }
    button.danger {
      width: 100%; padding: 14px; border-radius: 10px;
      background: rgba(255,107,107,0.18); color: var(--err);
      border: 1px solid rgba(255,107,107,0.4);
      font: inherit; font-weight: 600; letter-spacing: 0.04em;
      text-transform: uppercase; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    button.danger:active { background: rgba(255,107,107,0.28); }
    button.danger[disabled] { opacity: 0.5; }
    a { color: var(--accent); text-decoration: none; }
    a:active { opacity: 0.7; }
    small { color: var(--dim); font-size: 12px; }
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--card); border: 1px solid rgba(255,255,255,0.08);
      padding: 10px 16px; border-radius: 999px; font-size: 14px;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
  <main>
    <h1>Renée status</h1>
    <div class="card" id="pod-card">
      <div class="row"><span class="key">Pod</span><span class="val" id="pod-status">…</span></div>
      <div class="row"><span class="key">GPU</span><span class="val" id="pod-gpu">…</span></div>
      <div class="row"><span class="key">Uptime</span><span class="val" id="pod-uptime">…</span></div>
    </div>
    <div class="card" id="cost-card">
      <div class="row"><span class="key">Session $</span><span class="val" id="cost-session">…</span></div>
      <div class="row"><span class="key">Today $</span><span class="val" id="cost-today">…</span></div>
      <div class="row"><span class="key">Month $</span><span class="val" id="cost-month">…</span></div>
    </div>
    <div class="card" id="beacon-card">
      <div class="row"><span class="key">Beacon</span><span class="val" id="beacon-state">…</span></div>
      <div class="row"><span class="key">Heartbeats</span><span class="val" id="beacon-hbs">…</span></div>
    </div>
    <div class="card" id="topic-card">
      <div class="row"><span class="key">Topic</span><span class="val" id="topic-current">—</span></div>
      <div style="display:flex; gap:8px; padding-top:8px;">
        <input id="topic-input" type="text" maxlength="200" placeholder="set session topic"
          style="flex:1; padding:10px; background:#0f1218; color:var(--fg);
                 border:1px solid #2a2f38; border-radius:8px;
                 font:inherit; -webkit-appearance:none;" />
        <button id="topic-set" type="button"
          style="padding:10px 16px; border-radius:8px; background:var(--accent);
                 color:#120a1f; border:0; font:inherit; font-weight:600;
                 -webkit-tap-highlight-color:transparent;">set</button>
      </div>
      <small id="topic-hint">Sets via WS message; takes effect on Renée's next greeting.</small>
    </div>
    <button id="stop" class="danger">Stop the pod</button>
    <p style="margin-top:14px; text-align:center;">
      <small><a href="/">back to talking</a></small>
    </p>
    <p style="margin-top:6px; text-align:center;">
      <small id="updated">refreshing…</small>
    </p>
  </main>
  <div id="toast" role="status"></div>
  <script src="/status.js"></script>
</body>
</html>
