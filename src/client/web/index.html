<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0b0d10" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Renée" />
  <link rel="manifest" href="/manifest.json" />
  <title>Renée</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d10;
      --fg: #eaeef3;
      --dim: #7d8691;
      --accent: #c8a2ff;
      --accent-listening: #71d1ff;
      --accent-speaking: #ffa46b;
      --ok: #56d193;
      --warn: #e8b24a;
      --err: #ff6b6b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--fg);
      font: 16px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden; overscroll-behavior: none; }
    body {
      display: flex; flex-direction: column; align-items: center;
      justify-content: space-between;
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
      background: radial-gradient(ellipse at top, #14161b 0%, #0b0d10 60%);
    }
    #status {
      position: absolute; top: calc(env(safe-area-inset-top) + 12px); left: 0; right: 0;
      text-align: center; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--dim); display: flex; justify-content: center; align-items: center; gap: 8px;
    }
    #status .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--warn);
      transition: background 0.3s; }
    #status.connected .dot { background: var(--ok); }
    #status.error     .dot { background: var(--err); }

    main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; width: 100%;
    }
    #orb {
      position: relative; width: min(72vw, 320px); height: min(72vw, 320px);
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #2a2240 0%, #16151c 70%);
      box-shadow: 0 0 60px rgba(200, 162, 255, 0.15), inset 0 0 40px rgba(200, 162, 255, 0.08);
      display: flex; align-items: center; justify-content: center;
      transition: box-shadow 0.4s, background 0.4s;
      cursor: pointer;
    }
    #orb::before {
      content: ""; position: absolute; inset: -8px; border-radius: 50%;
      border: 2px solid rgba(200, 162, 255, 0.25); opacity: 0;
      animation: none;
    }
    #orb.listening { box-shadow: 0 0 80px rgba(113, 209, 255, 0.35),
                                   inset 0 0 60px rgba(113, 209, 255, 0.18); }
    #orb.speaking  { box-shadow: 0 0 80px rgba(255, 164, 107, 0.4),
                                   inset 0 0 60px rgba(255, 164, 107, 0.22); }
    #orb.listening::before, #orb.speaking::before {
      opacity: 1; animation: pulse 1.6s ease-out infinite;
    }
    #orb.listening::before { border-color: rgba(113, 209, 255, 0.45); }
    #orb.speaking::before  { border-color: rgba(255, 164, 107, 0.55); }
    @keyframes pulse {
      0%   { transform: scale(1);    opacity: 0.9; }
      100% { transform: scale(1.22); opacity: 0;   }
    }

    #orb-label { font-size: 13px; letter-spacing: 0.12em; color: var(--dim);
      text-transform: uppercase; user-select: none; pointer-events: none; }

    #transcript {
      width: 100%; max-width: 520px; padding: 20px;
      display: flex; flex-direction: column; gap: 10px;
      min-height: 96px;
    }
    .line { opacity: 0; transform: translateY(4px); transition: opacity 0.3s, transform 0.3s;
      font-size: 15px; line-height: 1.45; word-wrap: break-word; }
    .line.show { opacity: 1; transform: none; }
    .line .who { color: var(--dim); font-size: 11px; letter-spacing: 0.1em;
      text-transform: uppercase; display: block; margin-bottom: 2px; }
    .line.you .who     { color: var(--accent-listening); }
    .line.renee .who   { color: var(--accent-speaking); }

    #ptt {
      margin: 8px 0 max(16px, env(safe-area-inset-bottom)); padding: 14px 32px;
      background: rgba(255,255,255,0.06); color: var(--fg);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 999px;
      font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase;
      user-select: none; -webkit-user-select: none; touch-action: manipulation;
    }
    #ptt.active { background: var(--accent-listening); color: #091015; border-color: transparent; }
    #ptt[hidden] { display: none; }

    #overlay {
      position: fixed; inset: 0; background: rgba(11, 13, 16, 0.92);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 10; gap: 12px; padding: 24px; text-align: center;
    }
    #overlay h1 { font-size: 28px; font-weight: 300; letter-spacing: 0.04em; }
    #overlay p  { color: var(--dim); max-width: 320px; }
    #overlay button {
      margin-top: 20px; padding: 16px 42px; border-radius: 999px;
      background: var(--accent); color: #120a1f; border: 0;
      font-size: 15px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600;
    }
    #overlay[hidden] { display: none; }

    .err { color: var(--err); }
  </style>
</head>
<body>
  <div id="status" role="status"><span class="dot"></span><span id="status-text">connecting</span></div>

  <main>
    <div id="orb" aria-label="Renée">
      <div id="orb-label">idle</div>
    </div>
    <div id="transcript" aria-live="polite">
      <div class="line you"   id="line-you"><span class="who">you</span><span class="text"></span></div>
      <div class="line renee" id="line-renee"><span class="who">renée</span><span class="text"></span></div>
    </div>
  </main>

  <button id="ptt" hidden aria-pressed="false">Hold to talk</button>

  <div id="overlay" role="dialog" aria-modal="true">
    <h1>Renée</h1>
    <p>Tap to grant microphone access and start talking. Works best with a stable Tailscale connection.</p>
    <button id="start">Tap to start</button>
    <p id="overlay-err" class="err" hidden></p>
  </div>

  <script>
  (() => {
    const SAMPLE_RATE = 48000;
    const WS_PATH = "/ws";

    const statusEl = document.getElementById("status");
    const statusText = document.getElementById("status-text");
    const overlay = document.getElementById("overlay");
    const overlayErr = document.getElementById("overlay-err");
    const startBtn = document.getElementById("start");
    const orb = document.getElementById("orb");
    const orbLabel = document.getElementById("orb-label");
    const youText = document.querySelector("#line-you .text");
    const reneeText = document.querySelector("#line-renee .text");
    const youLine = document.getElementById("line-you");
    const reneeLine = document.getElementById("line-renee");
    const ptt = document.getElementById("ptt");

    let ws = null;
    let audioCtx = null;
    let micStream = null;
    let micNode = null;
    let captureMuted = false;   // PTT muting: when true, send silence
    let pttEnabled = false;
    let reconnectTimer = null;
    let reconnectDelay = 1000;
    let nextPlayTime = 0;
    let lastAudioAt = 0;
    let speakingTimer = null;

    function setStatus(text, cls) {
      statusText.textContent = text;
      statusEl.className = cls || "";
    }

    function setOrb(mode) {
      orb.classList.remove("listening", "speaking");
      if (mode === "listening" || mode === "speaking") orb.classList.add(mode);
      orbLabel.textContent = mode || "idle";
    }

    function showLine(el, textEl, text) {
      textEl.textContent = text;
      el.classList.add("show");
    }

    async function unlockAndStart() {
      overlayErr.hidden = true;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
        if (audioCtx.state === "suspended") await audioCtx.resume();
      } catch (e) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === "suspended") await audioCtx.resume();
      }
      nextPlayTime = audioCtx.currentTime;

      try {
        micStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            channelCount: 1,
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true,
            sampleRate: SAMPLE_RATE,
          },
          video: false,
        });
      } catch (e) {
        overlayErr.textContent = "Microphone permission denied: " + e.message;
        overlayErr.hidden = false;
        return;
      }

      await setupWorklet();
      overlay.hidden = true;
      ptt.hidden = false;
      connectWS();
    }

    async function setupWorklet() {
      const code = `
        class Capture extends AudioWorkletProcessor {
          constructor() { super(); this._muted = false;
            this.port.onmessage = (e) => { if (e.data && e.data.muted !== undefined) this._muted = e.data.muted; };
          }
          process(inputs) {
            const ch = inputs[0][0];
            if (!ch) return true;
            const n = ch.length;
            const out = new Int16Array(n);
            if (!this._muted) {
              for (let i = 0; i < n; i++) {
                let s = ch[i];
                if (s > 1) s = 1; else if (s < -1) s = -1;
                out[i] = s < 0 ? s * 32768 : s * 32767;
              }
            }
            this.port.postMessage(out.buffer, [out.buffer]);
            return true;
          }
        }
        registerProcessor('renee-capture', Capture);
      `;
      const url = URL.createObjectURL(new Blob([code], { type: "application/javascript" }));
      await audioCtx.audioWorklet.addModule(url);
      URL.revokeObjectURL(url);
      const src = audioCtx.createMediaStreamSource(micStream);
      micNode = new AudioWorkletNode(audioCtx, "renee-capture");
      micNode.port.onmessage = (e) => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(e.data);
      };
      src.connect(micNode);
      // Needed to keep the worklet processing; dest is effectively silent.
      const sink = audioCtx.createGain();
      sink.gain.value = 0;
      micNode.connect(sink).connect(audioCtx.destination);
    }

    function setMuted(m) {
      captureMuted = m;
      if (micNode) micNode.port.postMessage({ muted: m });
    }

    function connectWS() {
      const proto = window.location.protocol === "https:" ? "wss:" : "ws:";
      const url = `${proto}//${window.location.host}${WS_PATH}`;
      setStatus("connecting", "");
      try {
        ws = new WebSocket(url);
        ws.binaryType = "arraybuffer";
      } catch (e) {
        setStatus("connection error", "error");
        scheduleReconnect();
        return;
      }
      ws.onopen = () => {
        setStatus("connected", "connected");
        reconnectDelay = 1000;
        setOrb("listening");
        if (pttEnabled) setMuted(true);   // start muted if PTT is active
      };
      ws.onclose = () => {
        setStatus("reconnecting", "error");
        setOrb("idle");
        scheduleReconnect();
      };
      ws.onerror = () => setStatus("connection error", "error");
      ws.onmessage = (ev) => handleMessage(ev.data);
    }

    function scheduleReconnect() {
      if (reconnectTimer) clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
        connectWS();
      }, reconnectDelay);
    }

    function handleMessage(data) {
      if (typeof data === "string") {
        try {
          const msg = JSON.parse(data);
          if (msg.type === "transcript") {
            showLine(youLine, youText, msg.text || "");
          } else if (msg.type === "response") {
            showLine(reneeLine, reneeText, msg.text || "");
          }
        } catch (_) {}
        return;
      }
      // Binary: int16 PCM @ 48kHz — schedule playback.
      playPCM(new Int16Array(data));
      noteSpeaking();
    }

    function playPCM(int16) {
      if (!audioCtx) return;
      const n = int16.length;
      if (!n) return;
      const f32 = new Float32Array(n);
      for (let i = 0; i < n; i++) f32[i] = int16[i] / 32768;
      const buf = audioCtx.createBuffer(1, n, SAMPLE_RATE);
      buf.copyToChannel(f32, 0);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.connect(audioCtx.destination);
      const now = audioCtx.currentTime;
      if (nextPlayTime < now) nextPlayTime = now;
      src.start(nextPlayTime);
      nextPlayTime += n / SAMPLE_RATE;
    }

    function noteSpeaking() {
      lastAudioAt = performance.now();
      setOrb("speaking");
      if (speakingTimer) clearTimeout(speakingTimer);
      speakingTimer = setTimeout(() => {
        // If no audio received for 250 ms, revert to listening.
        if (performance.now() - lastAudioAt >= 240) setOrb("listening");
      }, 260);
    }

    // PTT
    function pttDown(e) { e.preventDefault(); ptt.classList.add("active"); ptt.setAttribute("aria-pressed","true"); setMuted(false); }
    function pttUp(e)   { e.preventDefault(); ptt.classList.remove("active"); ptt.setAttribute("aria-pressed","false"); setMuted(true); }
    ptt.addEventListener("pointerdown", pttDown);
    ptt.addEventListener("pointerup", pttUp);
    ptt.addEventListener("pointercancel", pttUp);
    ptt.addEventListener("pointerleave", pttUp);

    // The PTT button is a fallback — the orb enables it on double-tap.
    let orbTapTimer = null;
    orb.addEventListener("click", () => {
      if (orbTapTimer) {
        clearTimeout(orbTapTimer); orbTapTimer = null;
        pttEnabled = !pttEnabled;
        ptt.hidden = !pttEnabled;
        setMuted(pttEnabled);  // mute by default when PTT turned on
      } else {
        orbTapTimer = setTimeout(() => { orbTapTimer = null; }, 350);
      }
    });

    // Service worker registration (offline shell).
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }

    startBtn.addEventListener("click", unlockAndStart);

    // Keep the tab awake on some browsers by reacting to visibility changes.
    // On iOS Safari a screen lock can silently close the websocket; when the
    // user unlocks and brings the tab forward we reconnect immediately
    // instead of waiting for the next exponential-backoff tick.
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) return;
      if (!ws || ws.readyState === WebSocket.CLOSED || ws.readyState === WebSocket.CLOSING) {
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
        reconnectDelay = 1000;
        connectWS();
      }
      if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
    });

    // Request a wake lock when available so the screen doesn't sleep
    // while Renée is active. Silent no-op on browsers that don't support it.
    (async () => {
      try {
        if ("wakeLock" in navigator) {
          await navigator.wakeLock.request("screen");
        }
      } catch (_) {}
    })();
  })();
  </script>
</body>
</html>
